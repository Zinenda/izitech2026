backend:
  name: git-gateway
  branch: main

local_backend: true
publish_mode: editorial_workflow
media_folder: public/images/uploads
public_folder: /images/uploads

site_url: https://izitech.co.mz
display_url: https://izitech.co.mz
logo_url: /favicon.svg

collections:
  - name: blog
    label: Blog
    folder: src/content/blog
    create: true
    delete: true
    slug: "{{slug}}"
    format: frontmatter
    editor:
      preview: true
    fields:
      - { label: Title PT, name: title, widget: string }
      - { label: Title EN, name: titleEn, widget: string }
      - { label: Description PT, name: description, widget: text }
      - { label: Description EN, name: descriptionEn, widget: text }
      - { label: Publish Date, name: pubDate, widget: datetime }
      - { label: Category, name: category, widget: string }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }
  - name: services
    label: Services
    folder: src/content/services
    create: true
    delete: true
    slug: "{{slug}}"
    format: frontmatter
    fields:
      - { label: Title PT, name: title, widget: string }
      - { label: Title EN, name: titleEn, widget: string }
      - { label: Description PT, name: description, widget: text }
      - { label: Description EN, name: descriptionEn, widget: text }
      - { label: Icon, name: icon, widget: string, required: false }
      - { label: Order, name: order, widget: number, default: 1 }
      - { label: Body, name: body, widget: markdown, required: false }
  - name: portfolio
    label: Portfolio
    folder: src/content/portfolio
    create: true
    delete: true
    slug: "{{slug}}"
    format: frontmatter
    fields:
      - { label: Title PT, name: title, widget: string }
      - { label: Title EN, name: titleEn, widget: string }
      - { label: Category, name: category, widget: string }
      - { label: Summary PT, name: summary, widget: text }
      - { label: Summary EN, name: summaryEn, widget: text }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Year, name: year, widget: number }
      - { label: Body, name: body, widget: markdown, required: false }
